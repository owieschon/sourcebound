<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 920" role="img" aria-labelledby="title desc">
  <title id="title">How clean-docs turns repository sources into verified documentation</title>
  <desc id="desc">Inside the clean-docs system, repository sources pass through typed evidence and source bindings into the clean-docs engine. A versioned writing standard also enters the engine. The engine repairs documentation, rejects stale changes in continuous integration, and projects verified context.</desc>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#a9bfda"/>
    </pattern>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L11 5.5L0 11Z" fill="#25225f"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#26355e" flood-opacity="0.14"/>
    </filter>
    <style>
      .group-label { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: .09em; fill: #4541a2; }
      .card-title { font: 750 20px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #15143b; }
      .output-title { font: 750 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #15143b; }
      .body { font: 500 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #41415f; }
      .engine-title { font: 750 26px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .engine-body { font: 550 16px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #eef0ff; }
      .connector { fill: none; stroke: #25225f; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .port { fill: #ffffff; stroke: #25225f; stroke-width: 3; }
      .card { fill: #ffffff; stroke: #302d78; stroke-width: 2.5; }
      .group { fill: #deecfc; fill-opacity: .72; stroke: #716dc2; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1120" height="920" fill="#edf6ff"/>
  <rect width="1120" height="920" fill="url(#grid)"/>
  <rect x="28" y="28" width="1064" height="864" rx="18" fill="#edf6ff" fill-opacity=".86" stroke="#25225f" stroke-width="2.5" stroke-dasharray="7 7"/>

  <rect x="54" y="50" width="36" height="36" rx="7" fill="#25225f"/>
  <path d="M65 61h14v14H65zM69 57v22M75 57v22" fill="none" stroke="#ffffff" stroke-width="2"/>
  <text x="106" y="70" class="card-title">clean-docs system</text>
  <text x="106" y="93" class="body">Source-bound documentation pipeline</text>

  <rect class="group" x="56" y="122" width="1008" height="252" rx="16"/>
  <text x="80" y="153" class="group-label">EVIDENCE PATH</text>

  <g data-card="repository-sources" filter="url(#shadow)">
    <rect class="card" x="80" y="180" width="300" height="154" rx="12"/>
    <rect x="102" y="202" width="40" height="40" rx="7" fill="#dbe8ff" stroke="#302d78" stroke-width="2"/>
    <path d="M112 214h20M112 222h15M112 230h18" stroke="#302d78" stroke-width="2.5" stroke-linecap="round"/>
    <text x="158" y="220" class="card-title">Repository sources</text>
    <text x="102" y="270" class="body">Code, schemas, and commands</text>
    <text x="102" y="298" class="body">Package and API metadata</text>
  </g>
  <circle class="port" cx="380" cy="257" r="7"/>
  <path class="connector" d="M387 257H408"/>

  <g data-card="typed-evidence" filter="url(#shadow)">
    <rect class="card" x="410" y="180" width="300" height="154" rx="12"/>
    <rect x="432" y="202" width="40" height="40" rx="7" fill="#e8e5ff" stroke="#302d78" stroke-width="2"/>
    <path d="M441 211h22l-5 11 5 11h-22l5-11z" fill="none" stroke="#302d78" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="488" y="220" class="card-title">Typed evidence</text>
    <text x="432" y="270" class="body">Static extraction</text>
    <text x="432" y="298" class="body">Declared, bounded execution</text>
  </g>
  <circle class="port" cx="710" cy="257" r="7"/>
  <path class="connector" d="M717 257H738"/>

  <g data-card="source-bindings" filter="url(#shadow)">
    <rect class="card" x="740" y="180" width="300" height="154" rx="12"/>
    <rect x="762" y="202" width="40" height="40" rx="7" fill="#dff4ed" stroke="#302d78" stroke-width="2"/>
    <circle cx="773" cy="222" r="4" fill="#302d78"/>
    <circle cx="791" cy="213" r="4" fill="#302d78"/>
    <circle cx="791" cy="231" r="4" fill="#302d78"/>
    <path d="M777 220l10-5M777 224l10 5" stroke="#302d78" stroke-width="2"/>
    <text x="818" y="220" class="card-title">Source bindings</text>
    <text x="762" y="270" class="body">Regions, command pins, and symbols</text>
    <text x="762" y="298" class="body">Facts keep a canonical owner</text>
  </g>

  <rect class="group" x="56" y="414" width="1008" height="214" rx="16"/>
  <text x="80" y="445" class="group-label">DOCUMENTATION CONTROL</text>

  <path class="connector" d="M890 334V395H956V530H922"/>
  <circle class="port" cx="890" cy="334" r="7"/>

  <g data-card="writing-standard" filter="url(#shadow)">
    <rect class="card" x="80" y="470" width="300" height="126" rx="12"/>
    <rect x="102" y="492" width="40" height="40" rx="7" fill="#fff0ae" stroke="#302d78" stroke-width="2"/>
    <path d="M112 503h20M112 511h20M112 519h14" stroke="#302d78" stroke-width="2.5" stroke-linecap="round"/>
    <text x="158" y="510" class="card-title">Writing standard</text>
    <text x="102" y="558" class="body">Versioned policy for form</text>
    <text x="102" y="578" class="body">Defines the reader experience</text>
  </g>
  <circle class="port" cx="380" cy="533" r="7"/>
  <path class="connector" d="M387 533H438"/>

  <g data-card="clean-docs-engine" filter="url(#shadow)">
    <rect x="440" y="470" width="480" height="126" rx="12" fill="#29266d" stroke="#15143b" stroke-width="3"/>
    <rect x="464" y="493" width="42" height="42" rx="7" fill="#ffffff"/>
    <path d="M474 514h22M485 503v22" stroke="#29266d" stroke-width="3" stroke-linecap="round"/>
    <text x="524" y="510" class="engine-title">clean-docs engine</text>
    <text x="524" y="536" class="engine-body">Checks source facts against documented form</text>
    <text x="464" y="574" class="engine-body">derive · check · verify · project</text>
  </g>

  <rect class="group" x="56" y="670" width="1008" height="194" rx="16"/>
  <text x="80" y="701" class="group-label">VERIFIED OUTCOMES</text>

  <circle class="port" cx="520" cy="596" r="7"/>
  <circle class="port" cx="680" cy="596" r="7"/>
  <circle class="port" cx="840" cy="596" r="7"/>
  <path class="connector" d="M520 603V646H330V718"/>
  <path class="connector" d="M680 603V646H660V718"/>
  <path class="connector" d="M840 603V646H990V718"/>

  <g data-card="repair-documentation" filter="url(#shadow)">
    <rect class="card" x="80" y="720" width="300" height="118" rx="12"/>
    <rect x="102" y="742" width="40" height="40" rx="7" fill="#d9f3e9" stroke="#302d78" stroke-width="2"/>
    <path d="M111 762l8 8 15-19" fill="none" stroke="#12674e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="158" y="759" class="output-title">Repair documentation</text>
    <text x="158" y="784" class="body">Update bound regions</text>
    <text x="102" y="817" class="body">Source and docs change together</text>
  </g>

  <g data-card="reject-stale-changes" filter="url(#shadow)">
    <rect class="card" x="410" y="720" width="300" height="118" rx="12"/>
    <rect x="432" y="742" width="40" height="40" rx="7" fill="#ffe0dd" stroke="#302d78" stroke-width="2"/>
    <path d="M442 752l20 20M462 752l-20 20" stroke="#a52d36" stroke-width="3.5" stroke-linecap="round"/>
    <text x="488" y="759" class="output-title">Reject stale changes</text>
    <text x="488" y="784" class="body">Read-only CI gate</text>
    <text x="432" y="817" class="body">Exit nonzero before merge</text>
  </g>

  <g data-card="project-verified-context" filter="url(#shadow)">
    <rect class="card" x="740" y="720" width="300" height="118" rx="12"/>
    <rect x="762" y="742" width="40" height="40" rx="7" fill="#e7e4ff" stroke="#302d78" stroke-width="2"/>
    <path d="M771 752h20v18h-20zM766 757v18h20" fill="none" stroke="#302d78" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="818" y="759" class="output-title">Project verified context</text>
    <text x="818" y="784" class="body">llms.txt and context bundles</text>
    <text x="762" y="817" class="body">Grounded release facts</text>
  </g>
</svg>
