      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: >-
          python -m pip install
          "build==1.2.2.post1" "PyYAML==6.0.3" "setuptools==75.8.0" "wheel==0.45.1"
      - run: >-
          python -m pip download
          --only-binary=:all:
          --dest wheelhouse
          "PyYAML==6.0.3"
      - run: python scripts/build_release.py --out dist
      - run: >-
          python scripts/test_readme_quickstart.py
          --wheel dist/*.whl
          --wheelhouse wheelhouse
          --out sourcebound-quickstart.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sourcebound-quickstart-${{ matrix.os }}-${{ github.sha }}
          path: sourcebound-quickstart.json
          if-no-files-found: error

  acceptance-v0-1:
