name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install ".[dev]"
      - run: python -m pytest
      - run: python -m mypy src/clean_docs
      - run: python -m ruff check src tests
      - run: python scripts/check_doc_names.py
      - run: clean-docs --help
      - run: clean-docs --root . audit
      - run: clean-docs --root . doctor
      - run: clean-docs --root . emit stepwise-skill --out /tmp/clean-docs-stepwise
      - run: clean-docs --root /tmp/clean-docs-stepwise audit
      - run: clean-docs --root . emit llms-txt --out /tmp/clean-docs-llms.txt
      - run: python scripts/trusted_self_check.py

  public-dogfood:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install .
      - run: python scripts/dogfood_public_repos.py
      - run: python scripts/dogfood_bootstrap_repos.py

  release-artifact:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install "build==1.2.2.post1" "setuptools==75.8.0" "wheel==0.45.1"
      - run: python scripts/build_release.py --out dist
      - run: python -m venv /tmp/clean-docs-release
      - run: /tmp/clean-docs-release/bin/pip install dist/*.whl
      - run: /tmp/clean-docs-release/bin/clean-docs --help
      - run: /tmp/clean-docs-release/bin/clean-docs --root . audit
      - uses: actions/upload-artifact@v4
        with:
          name: clean-docs-release-${{ github.sha }}
          path: |
            dist/*.whl
            dist/SHA256SUMS
            dist/release.json
          if-no-files-found: error

  acceptance-v0-1:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install ".[dev]"
      - run: python scripts/run_acceptance.py --out clean-docs-v01-acceptance.json
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clean-docs-v0.1-acceptance-${{ github.sha }}
          path: clean-docs-v01-acceptance.json
          if-no-files-found: error

  acceptance-v0-2:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install ".[dev]"
      - run: >-
          python scripts/run_acceptance.py
          --registry tests/v02-acceptance.yml
          --out clean-docs-v02-acceptance.json
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clean-docs-v0.2-acceptance-${{ github.sha }}
          path: clean-docs-v02-acceptance.json
          if-no-files-found: error
