name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install ".[dev]"
      - run: python -m pytest
      - run: python -m mypy src/clean_docs
      - run: python -m ruff check src tests
      - run: python scripts/check_doc_names.py
      - run: clean-docs --help
      - run: clean-docs --root . audit
      - run: clean-docs --root . doctor
      - run: clean-docs --root . emit stepwise-skill --out /tmp/clean-docs-stepwise
      - run: clean-docs --root /tmp/clean-docs-stepwise audit
      - run: clean-docs --root . emit llms-txt --out /tmp/clean-docs-llms.txt
      - run: clean-docs --root . project --check
      - run: >-
          clean-docs --root . verdict
          --base "${{ github.event.pull_request.base.sha || github.event.before || github.sha }}"
          --head HEAD
          --format json
      - run: clean-docs --root . eval --format json
      - run: clean-docs --root . release --from v0.4.0 --to HEAD --format json
      - run: python scripts/record_demo.py --out /tmp/clean-docs-demo-evidence.json
      - run: cmp .clean-docs/demo/evidence.json /tmp/clean-docs-demo-evidence.json
      - run: python scripts/build_learning_evidence.py --out /tmp/clean-docs-learning-evidence.json
      - run: cmp .clean-docs/learning/ultra-csm-hygiene.json /tmp/clean-docs-learning-evidence.json
      - run: >-
          python scripts/record_learning_tutorial.py
          --clean-docs "$(command -v clean-docs)"
          --out /tmp/clean-docs-tutorial-evidence.json
      - run: cmp .clean-docs/learning/tutorial-evidence.json /tmp/clean-docs-tutorial-evidence.json
      - run: python scripts/render_social_preview.py --check
      - run: python scripts/trusted_self_check.py

  public-dogfood:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install .
      - run: python scripts/dogfood_public_repos.py
      - run: python scripts/dogfood_bootstrap_repos.py

  release-artifact:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: >-
          python -m pip install
          "build==1.2.2.post1" "PyYAML==6.0.3" "setuptools==75.8.0" "wheel==0.45.1"
      - run: python scripts/build_release.py --out dist
      - run: python -m venv /tmp/clean-docs-release
      - run: /tmp/clean-docs-release/bin/pip install dist/*.whl
      - run: /tmp/clean-docs-release/bin/clean-docs --help
      - run: /tmp/clean-docs-release/bin/clean-docs --root . audit
      - run: /tmp/clean-docs-release/bin/clean-docs --root . project --check
      - run: /tmp/clean-docs-release/bin/clean-docs --root . eval --format json
      - run: python scripts/test_release_lifecycle.py --wheel dist/*.whl
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: clean-docs-release-${{ github.sha }}
          path: |
            dist/*.whl
            dist/*.spdx.json
            dist/SHA256SUMS
            dist/release.json
          if-no-files-found: error

  acceptance-v0-1:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install ".[dev]"
      - run: python scripts/run_acceptance.py --out clean-docs-v01-acceptance.json
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: clean-docs-v0.1-acceptance-${{ github.sha }}
          path: clean-docs-v01-acceptance.json
          if-no-files-found: error

