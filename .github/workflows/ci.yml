name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  reusable-gate:
    uses: ./.github/workflows/reusable-sourcebound.yml
    with:
      package-ref: ${{ github.event.pull_request.head.sha || github.sha }}
      base-ref: ${{ github.event.pull_request.base.sha || github.event.before || github.sha }}
      head-ref: ${{ github.event.pull_request.head.sha || github.sha }}

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: "24"
      - run: python -m pip install ".[dev]"
      - run: python scripts/build_mdx_adapter.py
      - run: python -m pytest
      - run: python -m mypy src/clean_docs
      - run: python -m ruff check src tests
      - run: python scripts/check_doc_names.py
      - run: sourcebound --help
      - run: sourcebound --root . audit
      - run: sourcebound --root . doctor
      - run: sourcebound --root . emit stepwise-skill --out /tmp/sourcebound-stepwise
      - run: sourcebound --root /tmp/sourcebound-stepwise audit
      - run: sourcebound --root . emit llms-txt --out /tmp/sourcebound-llms.txt
      - run: sourcebound --root . project --check
      - run: |
          base="${{ github.event.pull_request.base.sha || github.event.before || github.sha }}"
          prior=()
          if git cat-file -e "$base:.sourcebound/reviews/repository-events.json" 2>/dev/null; then
            git show "$base:.sourcebound/reviews/repository-events.json" > /tmp/sourcebound-review-events-base.json
            prior=(--prior-ledger /tmp/sourcebound-review-events-base.json)
          fi
          sourcebound --root . review candidates \
            --input .sourcebound/reviews/repository-review.json \
            --ledger .sourcebound/reviews/repository-events.json \
            "${prior[@]}" \
            --out .sourcebound/improvement-candidates.json \
            --check \
            --format text
      - run: >-
          sourcebound --root . review lifecycle check
          --input .sourcebound/reviews/repository-review.json
          --state .sourcebound/improvement-lifecycle.json
          --format text
      - run: >-
          sourcebound --root . verdict
          --base "${{ github.event.pull_request.base.sha || github.event.before || github.sha }}"
          --head HEAD
          --format json
      - run: sourcebound --root . eval --format json
      - run: sourcebound --root . release --from v0.4.0 --to HEAD --format json
      - run: python scripts/record_demo.py --out /tmp/sourcebound-demo-evidence.json
      - run: cmp .sourcebound/demo/evidence.json /tmp/sourcebound-demo-evidence.json
      - run: python scripts/build_learning_evidence.py --out /tmp/sourcebound-learning-evidence.json
      - run: cmp .sourcebound/learning/ultra-csm-hygiene.json /tmp/sourcebound-learning-evidence.json
      - run: >-
          python scripts/record_learning_tutorial.py
          --sourcebound "$(command -v sourcebound)"
          --out /tmp/sourcebound-tutorial-evidence.json
      - run: cmp .sourcebound/learning/tutorial-evidence.json /tmp/sourcebound-tutorial-evidence.json
      - run: python scripts/render_social_preview.py --check
      - run: python scripts/trusted_self_check.py

  public-dogfood:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install .
      - run: python scripts/dogfood_public_repos.py
      - run: python scripts/dogfood_bootstrap_repos.py

  mdx-runtime:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "24"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: ${{ matrix.node-version }}
      - run: python -m pip install ".[dev]"
      - run: python scripts/build_mdx_adapter.py
      - run: python -m pytest tests/test_mdx.py tests/test_e2e_mdx_region.py
      - run: sourcebound --root . doctor

  release-artifact:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: "24"
      - run: >-
          python -m pip install
          "build==1.2.2.post1" "PyYAML==6.0.3" "setuptools==75.8.0" "wheel==0.45.1"
      - run: python scripts/build_release.py --out dist
      - run: python -m venv /tmp/sourcebound-release
      - run: /tmp/sourcebound-release/bin/pip install dist/*.whl
      - run: /tmp/sourcebound-release/bin/sourcebound --help
      - run: /tmp/sourcebound-release/bin/sourcebound --root . audit
      - run: /tmp/sourcebound-release/bin/sourcebound --root . project --check
      - run: /tmp/sourcebound-release/bin/sourcebound --root . eval --format json
      - run: python scripts/test_release_lifecycle.py --wheel dist/*.whl
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sourcebound-release-${{ github.sha }}
          path: |
            dist/*.whl
            dist/*.spdx.json
            dist/SHA256SUMS
            dist/release.json
          if-no-files-found: error

  quickstart-artifact:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
