name: Reusable clean-docs gate

on:
  workflow_call:
    inputs:
      package-ref:
        description: Immutable clean-docs commit or tag to install.
        required: true
        type: string

permissions:
  contents: read

jobs:
  clean-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pinned clean-docs
        run: >-
          python -m pip install
          "clean-docs @ git+https://github.com/owieschon/clean-docs.git@${{ inputs.package-ref }}"
      - name: Evaluate documentation gate
        run: |
          set +e
          clean-docs audit --format json > clean-docs-audit.json
          audit_status=$?
          clean-docs check --format json > clean-docs-check.json
          check_status=$?
          set -e
          test "$audit_status" -eq 0 && test "$check_status" -eq 0
      - name: Upload clean-docs evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clean-docs-evidence
          path: clean-docs-*.json
          if-no-files-found: error
