name: Reusable clean-docs gate

on:
  workflow_call:
    inputs:
      package-ref:
        description: Full 40-character clean-docs commit to install.
        required: true
        type: string
      base-ref:
        description: Base commit for changed-surface checks. Defaults to the pull request base.
        required: false
        default: ""
        type: string
      head-ref:
        description: Head commit for changed-surface checks. Defaults to the pull request head.
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  clean-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install pinned clean-docs
        env:
          CLEAN_DOCS_PACKAGE_REF: ${{ inputs.package-ref }}
        run: |
          set -eu
          python3 - <<'PY'
          import os
          import re

          package_ref = os.environ["CLEAN_DOCS_PACKAGE_REF"]
          if re.fullmatch(r"[0-9a-fA-F]{40}", package_ref) is None:
              raise SystemExit("package-ref must be a full 40-character commit")
          PY
          python3 -m pip install \
            "clean-docs @ git+https://github.com/owieschon/clean-docs.git@${CLEAN_DOCS_PACKAGE_REF}"
      - name: Evaluate documentation gate
        run: |
          set +e
          execution_args=()
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            execution_args+=(--no-exec)
          fi
          clean-docs audit --format json > clean-docs-audit.json
          audit_status=$?
          clean-docs check "${execution_args[@]}" \
            --format json > clean-docs-check.json
          check_status=$?
          base="${{ inputs.base-ref || github.event.pull_request.base.sha }}"
          head="${{ inputs.head-ref || github.event.pull_request.head.sha }}"
          changed_status=0
          if [ -n "$base" ] && [ -n "$head" ]; then
            clean-docs check --changed --base "$base" --head "$head" \
              "${execution_args[@]}" \
              --format json > clean-docs-changed.json
            changed_status=$?
            clean-docs check --changed --base "$base" --head "$head" \
              "${execution_args[@]}" \
              --format sarif > clean-docs-changed.sarif
          fi
          set -e
          test "$audit_status" -eq 0 && test "$check_status" -eq 0 && \
            test "$changed_status" -eq 0
      - name: Publish changed-surface annotations
        if: always() && hashFiles('clean-docs-changed.json') != ''
        run: |
          python3 - <<'PY'
          import json
          import os

          report = json.load(open("clean-docs-changed.json", encoding="utf-8"))
          def command_data(value):
              return str(value).replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")

          def command_property(value):
              return command_data(value).replace(":", "%3A").replace(",", "%2C")

          summary = ["## clean-docs changed-surface report", ""]
          summary.append(f"Required: {len(report['required'])}")
          summary.append(f"Coverage gaps: {len(report['gaps'])}")
          summary.append(f"Reasoned ignores: {len(report['ignored'])}")
          for section, level in (("required", "error"), ("gaps", "warning")):
              for finding in report[section]:
                  path = finding["doc"] or finding["source"]
                  message = f"{finding['id']}: {finding['message']}. Repair: {finding['repair']}"
                  print(f"::{level} file={command_property(path)}::{command_data(message)}")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("\n".join(summary) + "\n")
          PY
      - name: Write action receipt
        if: always()
        env:
          CLEAN_DOCS_PACKAGE_REF: ${{ inputs.package-ref }}
          CLEAN_DOCS_REPOSITORY: ${{ github.repository }}
          CLEAN_DOCS_REPOSITORY_REF: ${{ github.ref }}
          CLEAN_DOCS_REPOSITORY_SHA: ${{ github.sha }}
          CLEAN_DOCS_BASE_REF: ${{ inputs.base-ref || github.event.pull_request.base.sha }}
          CLEAN_DOCS_HEAD_REF: ${{ inputs.head-ref || github.event.pull_request.head.sha }}
          CLEAN_DOCS_EVENT: ${{ github.event_name }}
          CLEAN_DOCS_RUN_ID: ${{ github.run_id }}
          CLEAN_DOCS_RUN_ATTEMPT: ${{ github.run_attempt }}
          CLEAN_DOCS_WORKFLOW_REF: ${{ github.workflow_ref }}
          CLEAN_DOCS_WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from importlib.metadata import PackageNotFoundError, version
          from pathlib import Path

          output = Path("clean-docs-run.json")

          def result(path, field="ok"):
              candidate = Path(path)
              if not candidate.is_file():
                  return None
              try:
                  return json.loads(candidate.read_text(encoding="utf-8")).get(field)
              except (json.JSONDecodeError, OSError):
                  return None

          try:
              package_version = version("clean-docs")
          except PackageNotFoundError:
              package_version = None

          evidence_paths = sorted(
              path
              for pattern in ("clean-docs-*.json", "clean-docs-*.sarif")
              for path in Path(".").glob(pattern)
              if path != output
          )
          results = {
              "audit": result("clean-docs-audit.json"),
              "bindings": result("clean-docs-check.json"),
              "bindings_complete": result("clean-docs-check.json", "complete"),
              "changed": result("clean-docs-changed.json"),
          }
          changed_required = bool(
              os.environ["CLEAN_DOCS_BASE_REF"]
              and os.environ["CLEAN_DOCS_HEAD_REF"]
          )
          results["ok"] = (
              results["audit"] is True
              and results["bindings"] is True
              and (
                  results["changed"] is True
                  if changed_required
                  else results["changed"] is not False
              )
          )
          receipt = {
              "schema": "clean-docs.action-run.v2",
              "package": {
                  "ref": os.environ["CLEAN_DOCS_PACKAGE_REF"],
                  "version": package_version,
              },
              "source": {
                  "repository": os.environ["CLEAN_DOCS_REPOSITORY"],
                  "ref": os.environ["CLEAN_DOCS_REPOSITORY_REF"],
                  "sha": os.environ["CLEAN_DOCS_REPOSITORY_SHA"],
                  "comparison": (
                      {
                          "base": os.environ["CLEAN_DOCS_BASE_REF"],
                          "head": os.environ["CLEAN_DOCS_HEAD_REF"],
                      }
                      if changed_required
                      else None
                  ),
              },
              "run": {
                  "event": os.environ["CLEAN_DOCS_EVENT"],
                  "id": int(os.environ["CLEAN_DOCS_RUN_ID"]),
                  "attempt": int(os.environ["CLEAN_DOCS_RUN_ATTEMPT"]),
                  "workflow_ref": os.environ["CLEAN_DOCS_WORKFLOW_REF"],
                  "workflow_sha": os.environ["CLEAN_DOCS_WORKFLOW_SHA"],
              },
              "results": results,
              "evidence": [
                  {
                      "path": path.as_posix(),
                      "bytes": path.stat().st_size,
                      "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
                  }
                  for path in evidence_paths
              ],
          }
          output.write_text(
              json.dumps(receipt, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Upload clean-docs evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: clean-docs-evidence
          path: |
            clean-docs-*.json
            clean-docs-*.sarif
          if-no-files-found: error
