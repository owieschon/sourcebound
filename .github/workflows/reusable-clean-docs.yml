name: Reusable clean-docs gate

on:
  workflow_call:
    inputs:
      package-ref:
        description: Full 40-character clean-docs commit to install.
        required: true
        type: string
      base-ref:
        description: Base commit for the verdict. Defaults from the triggering event.
        required: false
        default: ""
        type: string
      head-ref:
        description: Head commit for the verdict. Defaults from the triggering event.
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  clean-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.head-ref || github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: "24"
      - name: Install pinned clean-docs
        env:
          CLEAN_DOCS_PACKAGE_REF: ${{ inputs.package-ref }}
        run: |
          set -eu
          python3 -I - <<'PY'
          import os
          import re

          package_ref = os.environ["CLEAN_DOCS_PACKAGE_REF"]
          if re.fullmatch(r"[0-9a-fA-F]{40}", package_ref) is None:
              raise SystemExit("package-ref must be a full 40-character commit")
          PY
          python3 -I -m pip install \
            "clean-docs @ git+https://github.com/owieschon/clean-docs.git@${CLEAN_DOCS_PACKAGE_REF}"
      - name: Resolve immutable comparison
        id: comparison
        env:
          CLEAN_DOCS_INPUT_BASE: ${{ inputs.base-ref }}
          CLEAN_DOCS_INPUT_HEAD: ${{ inputs.head-ref }}
          CLEAN_DOCS_EVENT: ${{ github.event_name }}
          CLEAN_DOCS_EVENT_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
          CLEAN_DOCS_EVENT_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          python3 -I - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          def git(*args: str) -> str:
              process = subprocess.run(
                  ["git", *args],
                  text=True,
                  capture_output=True,
                  check=False,
              )
              if process.returncode:
                  raise SystemExit(process.stderr.strip() or f"git {' '.join(args)} failed")
              return process.stdout.strip()

          head_ref = os.environ["CLEAN_DOCS_INPUT_HEAD"] or os.environ["CLEAN_DOCS_EVENT_HEAD"]
          base_ref = os.environ["CLEAN_DOCS_INPUT_BASE"] or os.environ["CLEAN_DOCS_EVENT_BASE"]
          if not head_ref:
              head_ref = "HEAD"
          if not base_ref or base_ref == "0" * 40:
              base_ref = "HEAD^"
          head = git("rev-parse", "--verify", f"{head_ref}^{{commit}}")
          base = git("rev-parse", "--verify", f"{base_ref}^{{commit}}")
          checkout = git("rev-parse", "--verify", "HEAD^{commit}")
          if checkout != head:
              raise SystemExit(f"checked-out commit {checkout} does not match verdict head {head}")
          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as handle:
              handle.write(f"base={base}\nhead={head}\n")
          PY
      - name: Evaluate one static verdict
        id: verdict
        env:
          CLEAN_DOCS_BASE: ${{ steps.comparison.outputs.base }}
          CLEAN_DOCS_EVIDENCE_DIR: ${{ runner.temp }}/clean-docs-evidence
          CLEAN_DOCS_HEAD: ${{ steps.comparison.outputs.head }}
        run: |
          mkdir -p "$CLEAN_DOCS_EVIDENCE_DIR"
          set +e
          python3 -I -m clean_docs --root "$GITHUB_WORKSPACE" verdict \
            --base "$CLEAN_DOCS_BASE" \
            --head "$CLEAN_DOCS_HEAD" \
            --format json > "$CLEAN_DOCS_EVIDENCE_DIR/clean-docs-verdict.json"
          status=$?
          set -e
          printf '%s\n' "$status" > "$CLEAN_DOCS_EVIDENCE_DIR/clean-docs-verdict.exit"
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"
      - name: Render SARIF from the recorded verdict
        if: always()
        env:
          CLEAN_DOCS_EVIDENCE_DIR: ${{ runner.temp }}/clean-docs-evidence
        run: |
          test -s "$CLEAN_DOCS_EVIDENCE_DIR/clean-docs-verdict.json" || exit 0
          python3 -I - <<'PY'
          import json
          import os
          from pathlib import Path

          from clean_docs.verdict import render_verdict_payload_sarif

          evidence_dir = Path(os.environ["CLEAN_DOCS_EVIDENCE_DIR"])
          source = evidence_dir / "clean-docs-verdict.json"
          payload = json.loads(source.read_text(encoding="utf-8"))
          (evidence_dir / "clean-docs-verdict.sarif").write_text(
              render_verdict_payload_sarif(payload),
              encoding="utf-8",
          )
          PY
      - name: Publish verdict annotations
        if: always()
        env:
          CLEAN_DOCS_EVIDENCE_DIR: ${{ runner.temp }}/clean-docs-evidence
        run: |
          test -s "$CLEAN_DOCS_EVIDENCE_DIR/clean-docs-verdict.json" || exit 0
          python3 -I - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence_dir = Path(os.environ["CLEAN_DOCS_EVIDENCE_DIR"])
          payload = json.loads(
              (evidence_dir / "clean-docs-verdict.json").read_text(encoding="utf-8")
          )

          def command_data(value):
              return str(value).replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")

          def command_property(value):
              return command_data(value).replace(":", "%3A").replace(",", "%2C")

          state = payload.get("state", "invalid")
          summary = ["## clean-docs pull-request verdict", "", f"State: `{state}`"]
          changed = payload.get("changed_surface")
          coverage = payload.get("coverage")
          if isinstance(changed, dict):
              summary.extend(
                  [
                      f"Changed artifacts: {len(changed.get('files', []))}",
                      f"Required obligations: {changed.get('required', 'unknown')}",
                      f"Coverage gaps: {changed.get('gaps', 'unknown')}",
                      f"Unknown impact findings: {changed.get('unknown', 'unknown')}",
                  ]
              )
          if isinstance(coverage, dict):
              summary.extend(
                  [
                      f"Inventory surfaces: {coverage.get('inventory_total', 'unknown')}",
                      f"Directly bound: {coverage.get('directly_bound', 'unknown')}",
                      f"Catalog only: {coverage.get('catalog_only', 'unknown')}",
                  ]
              )
          for finding in payload.get("findings", []):
              level = "error" if finding["level"] == "error" else "warning"
              message = f"{finding['message']}. Repair: {finding['repair']}"
              print(
                  f"::{level} file={command_property(finding['path'])}::"
                  f"{command_data(message)}"
              )
          non_claims = payload.get("non_claims", [])
          if non_claims:
              summary.extend(["", "This verdict does not claim:"])
              summary.extend(f"- {claim}" for claim in non_claims)
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("\n".join(summary) + "\n")
          PY
      - name: Write action receipt
        if: always()
        env:
          CLEAN_DOCS_EVIDENCE_DIR: ${{ runner.temp }}/clean-docs-evidence
          CLEAN_DOCS_PACKAGE_REF: ${{ inputs.package-ref }}
          CLEAN_DOCS_REPOSITORY: ${{ github.repository }}
          CLEAN_DOCS_REPOSITORY_REF: ${{ github.ref }}
          CLEAN_DOCS_REPOSITORY_SHA: ${{ steps.comparison.outputs.head }}
          CLEAN_DOCS_BASE_REF: ${{ steps.comparison.outputs.base }}
          CLEAN_DOCS_HEAD_REF: ${{ steps.comparison.outputs.head }}
          CLEAN_DOCS_EVENT: ${{ github.event_name }}
          CLEAN_DOCS_RUN_ID: ${{ github.run_id }}
          CLEAN_DOCS_RUN_ATTEMPT: ${{ github.run_attempt }}
          CLEAN_DOCS_WORKFLOW_REF: ${{ github.workflow_ref }}
          CLEAN_DOCS_WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          python3 -I - <<'PY'
          import hashlib
          import json
          import os
          from importlib.metadata import PackageNotFoundError, version
          from pathlib import Path

          evidence_dir = Path(os.environ["CLEAN_DOCS_EVIDENCE_DIR"])
          evidence_dir.mkdir(parents=True, exist_ok=True)
          output = evidence_dir / "clean-docs-run.json"

          def load(name):
              candidate = evidence_dir / name
              if not candidate.is_file():
                  return None
              try:
                  return json.loads(candidate.read_text(encoding="utf-8"))
              except (json.JSONDecodeError, OSError):
                  return None

          try:
              package_version = version("clean-docs")
          except PackageNotFoundError:
              package_version = None

          verdict = load("clean-docs-verdict.json")
          state = verdict.get("state") if isinstance(verdict, dict) else "invalid"
          audit = verdict.get("audit") if isinstance(verdict, dict) else None
          mechanisms = verdict.get("mechanisms") if isinstance(verdict, dict) else None
          execution = verdict.get("execution") if isinstance(verdict, dict) else None
          drift = 0
          skipped = 0
          if isinstance(mechanisms, dict):
              for mechanism in mechanisms.values():
                  if isinstance(mechanism, dict):
                      drift += int(mechanism.get("drifted", mechanism.get("stale", 0)))
                      skipped += int(mechanism.get("skipped", 0))
          evidence_paths = sorted(
              evidence_dir / name
              for name in (
                  "clean-docs-verdict.exit",
                  "clean-docs-verdict.json",
                  "clean-docs-verdict.sarif",
              )
              if (evidence_dir / name).is_file()
          )
          receipt = {
              "schema": "clean-docs.action-run.v2",
              "package": {
                  "ref": os.environ["CLEAN_DOCS_PACKAGE_REF"],
                  "version": package_version,
              },
              "source": {
                  "repository": os.environ["CLEAN_DOCS_REPOSITORY"],
                  "ref": os.environ["CLEAN_DOCS_REPOSITORY_REF"],
                  "sha": os.environ["CLEAN_DOCS_REPOSITORY_SHA"],
                  "comparison": (
                      {
                          "base": os.environ["CLEAN_DOCS_BASE_REF"],
                          "head": os.environ["CLEAN_DOCS_HEAD_REF"],
                      }
                      if os.environ["CLEAN_DOCS_BASE_REF"] and os.environ["CLEAN_DOCS_HEAD_REF"]
                      else None
                  ),
              },
              "run": {
                  "event": os.environ["CLEAN_DOCS_EVENT"],
                  "id": int(os.environ["CLEAN_DOCS_RUN_ID"]),
                  "attempt": int(os.environ["CLEAN_DOCS_RUN_ATTEMPT"]),
                  "workflow_ref": os.environ["CLEAN_DOCS_WORKFLOW_REF"],
                  "workflow_sha": os.environ["CLEAN_DOCS_WORKFLOW_SHA"],
              },
              "results": {
                  "audit": audit.get("ok") if isinstance(audit, dict) else None,
                  "bindings": drift == 0 if mechanisms is not None else None,
                  "bindings_complete": (
                      skipped == 0
                      and isinstance(execution, dict)
                      and execution.get("mode") == "static-only"
                  ),
                  "changed": state == "ready" if state in {"ready", "not_ready", "unknown"} else None,
                  "ok": state == "ready",
                  "verdict": state,
                  "verdict_digest": verdict.get("digest") if isinstance(verdict, dict) else None,
              },
              "authoritative_evidence": "clean-docs-verdict.json",
              "evidence": [
                  {
                      "path": path.name,
                      "bytes": path.stat().st_size,
                      "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
                  }
                  for path in evidence_paths
              ],
          }
          output.write_text(
              json.dumps(receipt, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Upload clean-docs evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: clean-docs-evidence
          path: ${{ runner.temp }}/clean-docs-evidence
          if-no-files-found: error
      - name: Enforce the recorded verdict
        if: always()
        env:
          CLEAN_DOCS_EVIDENCE_DIR: ${{ runner.temp }}/clean-docs-evidence
        run: |
          python3 -I - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          from clean_docs.verdict import (
              render_verdict_payload_sarif,
              validate_verdict_payload,
          )

          evidence_dir = Path(os.environ["CLEAN_DOCS_EVIDENCE_DIR"])
          verdict_path = evidence_dir / "clean-docs-verdict.json"
          sarif_path = evidence_dir / "clean-docs-verdict.sarif"
          status_path = evidence_dir / "clean-docs-verdict.exit"
          receipt_path = evidence_dir / "clean-docs-run.json"
          required = (verdict_path, sarif_path, status_path, receipt_path)
          if any(not path.is_file() or path.stat().st_size == 0 for path in required):
              raise SystemExit("verdict evidence is missing or empty")
          payload = json.loads(verdict_path.read_text(encoding="utf-8"))
          validate_verdict_payload(payload)
          if sarif_path.read_text(encoding="utf-8") != render_verdict_payload_sarif(payload):
              raise SystemExit("SARIF does not describe the recorded verdict")
          status = int(status_path.read_text(encoding="utf-8").strip())
          receipt = json.loads(receipt_path.read_text(encoding="utf-8"))
          for evidence in receipt["evidence"]:
              name = evidence["path"]
              if Path(name).name != name:
                  raise SystemExit(f"receipt evidence path is not a filename: {name}")
              path = evidence_dir / name
              if path.stat().st_size != evidence["bytes"]:
                  raise SystemExit(f"receipt byte count differs for {path}")
              if hashlib.sha256(path.read_bytes()).hexdigest() != evidence["sha256"]:
                  raise SystemExit(f"receipt digest differs for {path}")
          results = receipt.get("results", {})
          package = receipt.get("package", {})
          producer = payload.get("producer", {})
          source = receipt.get("source", {})
          comparison = source.get("comparison") if isinstance(source, dict) else None
          refs = payload.get("refs", {})
          if (
              receipt.get("authoritative_evidence") != verdict_path.name
              or results.get("verdict") != payload["state"]
              or results.get("verdict_digest") != payload["digest"]
              or results.get("ok") is not (payload["state"] == "ready")
              or package.get("version") != producer.get("version")
              or (
                  isinstance(comparison, dict)
                  and comparison.get("head") != refs.get("head")
              )
          ):
              raise SystemExit("action receipt does not describe the recorded verdict")
          if payload["state"] != "ready" or status != 0:
              raise SystemExit(f"clean-docs verdict is {payload['state']} with exit {status}")
          PY
