version: 1
execution:
  commands: deny
  allowed_commands:
    quickstart-audit:
      argv: ["{python}", -m, clean_docs, --root, ., audit]
      timeout_seconds: 30
      network: false
bindings:
  - id: product-overview
    type: region
    doc: README.md
    region: product-overview
    extractor: python-literal
    source:
      path: src/clean_docs/capabilities.py
      symbol: PRODUCT_OVERVIEW
    renderer: scalar
  - id: supported-bindings
    type: region
    doc: README.md
    region: supported-bindings
    extractor: python-literal
    source:
      path: src/clean_docs/capabilities.py
      symbol: SUPPORTED_BINDINGS
    renderer: markdown-table
    columns: [binding, source, output, check]
  - id: cli-reference
    type: region
    doc: docs/CLI.md
    region: cli-reference
    extractor: python-literal
    source:
      path: src/clean_docs/capabilities.py
      symbol: CLI_REFERENCE
    renderer: markdown-table
    columns: [command, job, writes]
  - id: manifest-reference
    type: region
    doc: README.md
    region: manifest-reference
    extractor: python-literal
    source:
      path: src/clean_docs/manifest.py
      symbol: MANIFEST_REFERENCE
    renderer: markdown-table
    columns: [binding, required, verifies]
  - id: evaluation-scorers
    type: region
    doc: docs/EVALUATION.md
    region: evaluation-scorers
    extractor: python-literal
    source:
      path: src/clean_docs/capabilities.py
      symbol: EVALUATION_SCORERS
    renderer: markdown-table
    columns: [scorer, input, passes when]
  - id: release-guide
    type: symbol
    doc: docs/RELEASES.md
    anchor: grounded-release-notes
    source: {path: src/clean_docs/release.py, symbol: build_release_report}
  - id: extension-guide
    type: symbol
    doc: docs/EXTENSIONS.md
    anchor: extension-api
    source: {path: src/clean_docs/plugins.py, symbol: _run_plugin}
  - id: migration-guide
    type: symbol
    doc: docs/EXTENSIONS.md
    anchor: migrate-a-prior-manifest
    source: {path: src/clean_docs/migration.py, symbol: build_migration_plan}
projections:
  llms_txt:
    output: llms.txt
    title: clean-docs documentation
    summary: Canonical product documentation with source-bound facts and content digests.
  bundles:
    - id: contributor
      output: .clean-docs/context/contributor.md
      include: [README.md, docs/EVALUATION.md]
  demo:
    output: docs/demo/index.html
    evidence: .clean-docs/demo/evidence.json
