    test: tests/test_context.py::test_context_compiler_is_deterministic_budgeted_and_authority_scoped
  - id: required-context-overflow
    test: tests/test_context.py::test_required_context_over_budget_is_unknown_not_empty_success
  - id: provider-failure-receipt
    test: tests/test_evaluation.py::test_live_provider_failure_preserves_pre_invocation_receipt
  - id: provider-deadline-receipt
    test: tests/test_evaluation.py::test_live_provider_timeout_preserves_bounded_failed_receipt
  - id: provider-write-conflict
    test: tests/test_evaluation.py::test_live_provider_repository_write_becomes_conflict
  - id: effective-mapping-key-semantics
    test: tests/test_source_claims.py::test_mapping_fact_uses_effective_python_keys_once
  - id: bounded-candidate-ranking
    test: tests/test_source_claims.py::test_candidate_rank_requires_ownership_and_precedes_drift_status
