    test: tests/test_impact.py::test_public_implementation_refactor_does_not_become_interface_work
  - id: typescript-interface-fingerprint
    test: tests/test_impact.py::test_typescript_signature_change_is_public_interface_work
  - id: line-move-not-public-impact
    test: tests/test_impact.py::test_document_line_moves_do_not_invent_semantic_events
  - id: unknown-cannot-become-no-impact
    test: tests/test_impact.py::test_unsupported_public_candidate_is_unknown_not_no_impact
  - id: public-default-obligations
    test: tests/test_impact.py::test_public_default_change_reaches_reference_and_migration_obligations
  - id: affected-contract-traversal
    test: tests/test_impact.py::test_binding_change_traverses_projection_and_evaluation
  - id: generated-output-non-recursion
    test: tests/test_impact.py::test_generated_projection_change_does_not_trigger_itself
