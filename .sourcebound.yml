version: 1
execution:
  commands: deny
  allowed_commands:
    quickstart-audit:
      argv: ["{python}", -m, sourcebound, --root, ., audit]
      timeout_seconds: 30
bindings:
  - id: repository-surface
    type: region
    doc: docs/SURFACE.md
    region: repository-surface
    extractor: repository-overview
    source: {path: .}
    renderer: markdown-fragment
  - id: product-overview
    type: region
    doc: README.md
    region: product-overview
    extractor: python-literal
    source:
      path: src/sourcebound/capabilities.py
      symbol: PRODUCT_OVERVIEW
    renderer: markdown-fragment
  - id: assurance-boundaries
    type: region
    doc: SOURCEBOUND_SPEC.md
    region: assurance-boundaries
    extractor: python-literal
    source:
      path: src/sourcebound/capabilities.py
      symbol: ASSURANCE_BOUNDARIES
    renderer: markdown-table
    columns: [surface, sourcebound proves, sourcebound does not prove]
  - id: supported-bindings
    type: region
    doc: docs/REFERENCE.md
    region: supported-bindings
    extractor: python-literal
    source:
      path: src/sourcebound/capabilities.py
      symbol: SUPPORTED_BINDINGS
    renderer: markdown-table
    columns: [binding, source, output, check]
  - id: cli-reference
    type: region
    doc: docs/CLI.md
    region: cli-reference
    extractor: python-literal
    source:
      path: src/sourcebound/capabilities.py
      symbol: CLI_REFERENCE
    renderer: markdown-table
    columns: [area, command, job, writes, example]
  - id: manifest-reference
    type: region
    doc: docs/REFERENCE.md
    region: manifest-reference
    extractor: python-literal
    source:
      path: src/sourcebound/manifest.py
      symbol: MANIFEST_REFERENCE
    renderer: markdown-table
    columns: [binding, required, verifies]
  - id: evaluation-scorers
    type: region
    doc: docs/EVALUATION.md
    region: evaluation-scorers
    extractor: python-literal
    source:
      path: src/sourcebound/capabilities.py
      symbol: EVALUATION_SCORERS
    renderer: markdown-table
    columns: [scorer, input, passes when]
  - id: init-proposer-guide
    type: symbol
    doc: docs/INIT_PROPOSER.md
    anchor: configure-the-provider
    source:
      path: src/sourcebound/phrasing.py
      symbol: CommandPhrasingProvider
  - id: context-compilation-guide
    type: symbol
    doc: docs/CONTEXT_COMPILATION.md
    anchor: compile-it
    source:
      path: src/sourcebound/context.py
      symbol: compile_context
  - id: improvement-candidate-guide
    type: symbol
    doc: docs/IMPROVEMENTS.md
    anchor: review-observations
    source:
      path: src/sourcebound/improvements.py
      symbol: compile_improvement_candidates
  - id: binding-sensitivity-reference
    type: symbol
    doc: docs/REFERENCE.md
    anchor: binding-sensitivity-inputs
    source:
      path: src/sourcebound/sensitivity.py
      symbol: evaluate_binding_sensitivity
  - id: verdict-reference
    type: symbol
    doc: docs/CLI.md
    anchor: pull-request-verdicts
    source:
      path: src/sourcebound/verdict.py
      symbol: build_pr_verdict
  - id: release-guide
    type: symbol
    doc: docs/RELEASES.md
    anchor: grounded-release-notes
    source: {path: src/sourcebound/release.py, symbol: build_release_report}
  - id: extension-guide
    type: symbol
    doc: docs/EXTENSIONS.md
    anchor: extension-api
    source: {path: src/sourcebound/plugins.py, symbol: _run_plugin}
  - id: migration-guide
    type: symbol
    doc: docs/EXTENSIONS.md
    anchor: migrate-a-prior-manifest
    source: {path: src/sourcebound/migration.py, symbol: build_migration_plan}
  - id: support-guide
    type: symbol
    doc: docs/SUPPORT.md
    anchor: record-local-outcomes
    source: {path: src/sourcebound/outcomes.py, symbol: build_outcome_receipt}
  - id: security-model
    type: symbol
    doc: docs/SECURITY_MODEL.md
    anchor: process-controls
    source: {path: src/sourcebound/isolation.py, symbol: run_isolated_process}
  - id: tutorial-outcomes
    type: region
    doc: docs/learn/tutorial-catch-a-lying-doc.md
    region: tutorial-outcomes
    extractor: json
    source:
      path: .sourcebound/learning/tutorial-evidence.json
      pointer: /steps
    renderer: markdown-table
    columns: [moment, command, exit, meaning]
  - id: deterministic-seam-evidence
    type: symbol
    doc: docs/learn/deep-dive-the-deterministic-seam.md
    anchor: evidence-authority
    source: {path: src/sourcebound/engine.py, symbol: evaluate}
  - id: deterministic-seam-phrasing
    type: symbol
    doc: docs/learn/deep-dive-the-deterministic-seam.md
    anchor: phrasing-boundary
    source: {path: src/sourcebound/phrasing.py, symbol: build_model_record}
  - id: deterministic-seam-gate
    type: symbol
    doc: docs/learn/deep-dive-the-deterministic-seam.md
    anchor: gate-authority
    source: {path: src/sourcebound/outcomes.py, symbol: build_outcome_receipt}
source_claim_checks:
  - id: binding-type-count
    kind: count
    doc: docs/REFERENCE.md
    anchor: binding-types
    subject: types
    source: src/sourcebound/manifest.py
    locator: MANIFEST_REFERENCE#count
review_contracts:
  - id: immutable-snapshot-boundary
    mode: observe
    sources:
      - id: snapshot-materialization
        path: src/sourcebound/snapshot.py
        extractor: python-symbol
        locator: RepositorySnapshot.materialized_root
      - id: snapshot-symlink-closure
        path: src/sourcebound/snapshot.py
        extractor: python-symbol
        locator: RepositorySnapshot._include_symlink_targets
    targets:
      - id: snapshot-product-contract
        path: SOURCEBOUND_SPEC.md
        extractor: markdown-section
        locator: "#evidence-and-execution"
public_dispositions:
  - base: 1e0bfe7a8fc75ea8d572c99986ed05e6164d6b08
    kind: artifact
    subject: fe7dc3155c564f68619597bba2e849be03cd76f34e96cdf4265b41e7e09ba623
    documentation: DECISION_LOG.md
    replacement: src/sourcebound/demo.py
    reason: The deployment trigger follows the package namespace rename without changing the published demo contract.
  - base: 2dddc88e0f4d08a75c63ff7c080412976e580b21
    kind: event
    subject: d42fb3ef1f98bf03c1fbcf0cd8cf42c10ee3ac1aad299bc9323fda478c2c2351
    documentation: docs/INSTALL.md
    replacement: sourcebound
    reason: The installation guide names the supported executable and upgrade path.
  - base: 2dddc88e0f4d08a75c63ff7c080412976e580b21
    kind: event
    subject: 4457b7281d00ea8f49113cbfff347ef0787a6e434ebe4e8991bb6b3126c2bba2
    documentation: docs/learn/tutorial-catch-a-lying-doc.md
    replacement: sourcebound
