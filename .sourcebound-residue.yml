version: 2
exclude:
  - pattern: .sourcebound/reader-trials*/**
    reason: Versioned content-addressed reader evidence preserves observed commands and paths verbatim.
  - pattern: .sourcebound/reviews/**
    reason: Governed review evidence preserves external source terms and locators verbatim.
  - pattern: .sourcebound/improvement-candidates.json
    reason: Generated review candidates preserve their governed external evidence verbatim.
  - pattern: docs/adapters/connected-event.md
    reason: The reference connected adapter names the external transport it implements.
