version: 1
tasks:
  - id: human-quickstart
    audience: human
    prompt: Run the documented manifest-free audit and confirm the expected result.
    context: [README.md]
    scorer:
      type: command
      commands:
        - ref: quickstart-audit
          documented_as: sourcebound audit
          exit_code: 0
          stdout_contains: ["audit:", "0 finding(s)"]
          stderr_contains: []
  - id: structured-command
    audience: agent
    prompt: Return the read-only documentation verification command as JSON.
    context: [.sourcebound/context/contributor.md]
    model:
      adapter: recorded
      name: recorded-fixture
      response: .sourcebound/evaluation/responses/structured-command.json
    scorer:
      type: structured-output
      expected: {command: sourcebound check}
  - id: recovery-procedure
    audience: agent
    prompt: Return the documented recovery sequence for source drift as JSON.
    context: [.sourcebound/context/contributor.md]
    model:
      adapter: recorded
      name: recorded-fixture
      response: .sourcebound/evaluation/responses/recovery.json
    scorer:
      type: structured-output
      expected:
        steps: [sourcebound check, sourcebound drive, sourcebound check]
  - id: manifest-round-trip
    audience: agent
    prompt: Create a manifest whose region binding keeps the fixture document equal to source.txt.
    context: [.sourcebound/context/contributor.md]
    model:
      adapter: recorded
      name: recorded-fixture
      response: .sourcebound/evaluation/responses/manifest.yml
    scorer:
      type: configuration
      repository: .sourcebound/evaluation/manifest-repo
  - id: limitation-retrieval
    audience: agent
    prompt: Does sourcebound itself enforce network isolation for allowlisted commands?
    context: [.sourcebound/context/contributor.md]
    model:
      adapter: recorded
      name: recorded-fixture
      response: .sourcebound/evaluation/responses/limitation.txt
    scorer:
      type: cited-limit
      answer: The host owns network isolation
      citation: README.md#current-boundaries
      forbidden: [sourcebound enforces network isolation]
