version: 1
context:
  - README.md
  - docs/CLI.md
  - docs/SUPPORT.md
  - docs/SECURITY_MODEL.md
profiles:
  - id: anthropic-opus-4-8
    provider: anthropic
    model: Opus 4.8
  - id: anthropic-sonnet-5
    provider: anthropic
    model: Sonnet 5
  - id: codex-gpt-5-5-high
    provider: codex
    model: GPT 5.5 High
  - id: codex-gpt-5-6-sol-high
    provider: codex
    model: GPT 5.6 Sol High
tasks:
  - id: identify-purpose
    instruction: Read only the README's first body block, then state who sourcebound applies to, the problem it addresses, and the capability it gives that reader.
    passes_when: The answer identifies maintainers facing code-to-documentation drift, the inability to tell which claims are stale, and a local deterministic path to repair and verify documentation.
  - id: install
    instruction: Install the candidate using only the published installation instructions.
    passes_when: The installed sourcebound command reports the candidate version.
  - id: protect-fixture
    instruction: Initialize an undocumented fixture repository and reach a passing protected baseline.
    passes_when: The manifest, generated documentation, and verification command all pass without undocumented setup knowledge.
  - id: repair-drift
    instruction: Declare one supported source-to-documentation region binding, establish a passing baseline, change its source, use the published repair path, and restore a passing check.
    passes_when: The bound source change fails first, the declared documentation region changes, dependent projections are refreshed, and the final check and verification pass.
  - id: explain-limitation
    instruction: Explain whether sourcebound itself revokes host network access for allowlisted processes and cite the published boundary.
    passes_when: The answer assigns network isolation to the execution environment and cites the canonical limitation.
