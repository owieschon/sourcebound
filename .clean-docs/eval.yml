version: 1
tasks:
  - id: human-quickstart
    audience: human
    prompt: Run the documented manifest-free audit and confirm the expected result.
    context: [README.md]
    scorer:
      type: command
      commands:
        - ref: quickstart-audit
          documented_as: clean-docs audit
          exit_code: 0
          stdout_contains: ["audit:", "0 finding(s)"]
          stderr_contains: []
  - id: structured-command
    audience: agent
    prompt: Return the read-only documentation verification command as JSON.
    context: [.clean-docs/context/contributor.md]
    model:
      adapter: recorded
      name: recorded-fixture
      response: .clean-docs/evaluation/responses/structured-command.json
    scorer:
      type: structured-output
      expected: {command: clean-docs check}
  - id: manifest-round-trip
    audience: agent
    prompt: Create a manifest whose region binding keeps the fixture document equal to source.txt.
    context: [.clean-docs/context/contributor.md]
    model:
      adapter: recorded
      name: recorded-fixture
      response: .clean-docs/evaluation/responses/manifest.yml
    scorer:
      type: configuration
      repository: .clean-docs/evaluation/manifest-repo
  - id: limitation-retrieval
    audience: agent
    prompt: Does clean-docs itself enforce network isolation for allowlisted commands?
    context: [.clean-docs/context/contributor.md]
    model:
      adapter: recorded
      name: recorded-fixture
      response: .clean-docs/evaluation/responses/limitation.txt
    scorer:
      type: cited-limit
      answer: Network isolation belongs to the execution environment
      citation: README.md#current-limits
      forbidden: [clean-docs enforces network isolation]
